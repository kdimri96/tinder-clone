name: tinder_clone
description: A Tinder-like dating app built with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.3.2
  socket_io_client: ^2.0.3+1

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Components
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  flutter_card_swiper: ^6.0.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  cupertino_icons: ^1.0.2

  # Utils
  intl: ^0.18.1
  timeago: ^3.6.0
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
